        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
                - message
                - status
              example:
                error: Unauthorized
                message: Invalid token
                status: 401
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
