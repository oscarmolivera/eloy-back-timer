  "/api/v1/auth/login":
    post:
      summary: Log in and obtain JWT access and refresh tokens
      tags:
      - Auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
            example:
              email: user6@example.com
              password: password123
      responses:
        '200':
          description: returns 200 and tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      role:
                        type: string
                    required:
                    - id
                    - email
                    - role
                required:
                - access_token
                - refresh_token
                - user
              example:
                access_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjozMDIsImV4cCI6MTc3NDE5NzA4OH0.JXpvI0rWbs5uT_r-qOInfdysP5Xpp1A9XnAwCbSa5r0
                refresh_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjozMDIsImV4cCI6MTc3NDgwMDk4OH0.Mcr_9A3A6WKTttrEPIXzXGLeybTsH2N3Ive-X-JSS5w
                user:
                  id: 302
                  email: user6@example.com
                  role: user
        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Invalid email or password
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Account is inactive
      security:
      - ApiKeyAuth: []
  "/api/v1/auth/logout":
    delete:
      summary: Log out by invalidating the current access token
      tags:
      - Auth
      responses:
        '204':
          description: returns 204
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
  "/api/v1/auth/refresh":
    post:
      summary: Refresh JWT access token using a valid refresh token
      tags:
      - Auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties: {}
            example: {}
      responses:
        '200':
          description: returns 200 and new access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                required:
                - access_token
              example:
                access_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjozMDUsImV4cCI6MTc3NDE5NzA4OH0.kqpUkgrXOxRUaI_Ock_hA3TvOz4N_fViGJfynGdHV7s
        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Invalid refresh token
      security:
      - ApiKeyAuth: []
  "/api/v1/health":
    get:
      summary: Check API health and database status
      tags:
      - Health
      responses:
        '200':
          description: returns connected database status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  environment:
                    type: string
                  timestamp:
                    type: string
                  database:
                    type: string
                required:
                - status
                - version
                - environment
                - timestamp
                - database
              example:
                status: ok
                version: 1.0.0
                environment: test
                timestamp: '2026-03-22T16:16:28Z'
                database: connected
        '401':
          description: returns 401 unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error
                - message
              example:
                error: Unauthorized
                message: Invalid or missing API key
      security:
      - ApiKeyAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained after successful login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Secret API key (used for health check and documentation)
security:
- BearerAuth: []
