paths:
  "/api/v1/admin/companies":
    get:
      summary: Validate user authorization for Company
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          description: returns a list of all companies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    active:
                      type: boolean
                    business_name:
                      nullable: true
                    ccc:
                      nullable: true
                    cif:
                      nullable: true
                    city:
                      nullable: true
                    contact_email:
                      nullable: true
                    contact_phone_main:
                      nullable: true
                    contact_phone_secondary:
                      nullable: true
                    created_at:
                      type: string
                    door:
                      nullable: true
                    floor:
                      nullable: true
                    logo_url:
                      nullable: true
                    name:
                      type: string
                    number:
                      nullable: true
                    postal_code:
                      nullable: true
                    province:
                      nullable: true
                    slug:
                      type: string
                    street:
                      nullable: true
                    updated_at:
                      type: string
                  required:
                  - id
                  - name
                  - business_name
                  - slug
                  - cif
                  - ccc
                  - logo_url
                  - city
                  - province
                  - postal_code
                  - street
                  - number
                  - floor
                  - door
                  - contact_email
                  - contact_phone_main
                  - contact_phone_secondary
                  - active
              example:
              - id: 985
                name: Acme Corporation 18
                business_name:
                slug: acme-corporation-18
                cif:
                ccc:
                logo_url:
                city:
                province:
                postal_code:
                street:
                number:
                floor:
                door:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                active: true
              - id: 986
                name: Acme Corporation 19
                business_name:
                slug: acme-corporation-19
                cif:
                ccc:
                logo_url:
                city:
                province:
                postal_code:
                street:
                number:
                floor:
                door:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                active: true
              - id: 987
                name: Acme Corporation 20
                business_name:
                slug: acme-corporation-20
                cif:
                ccc:
                logo_url:
                city:
                province:
                postal_code:
                street:
                number:
                floor:
                door:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                active: true
        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
                - message
                - status
              example:
                error: Unauthorized
                message: Invalid token
                status: 401
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
                - message
                - status
              example:
                error: Forbidden
                message: Access denied
                status: 403
    post:
      summary: Create a new company
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                company:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                  - name
              required:
              - company
            example:
              company:
                name: New Test Company
      responses:
        '201':
          description: creates a new company
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  active:
                    type: boolean
                  business_name:
                    nullable: true
                  ccc:
                    nullable: true
                  cif:
                    nullable: true
                  city:
                    nullable: true
                  contact_email:
                    nullable: true
                  contact_phone_main:
                    nullable: true
                  contact_phone_secondary:
                    nullable: true
                  created_at:
                    type: string
                  door:
                    nullable: true
                  floor:
                    nullable: true
                  logo_url:
                    nullable: true
                  name:
                    type: string
                  number:
                    nullable: true
                  postal_code:
                    nullable: true
                  province:
                    nullable: true
                  slug:
                    type: string
                  street:
                    nullable: true
                  updated_at:
                    type: string
                required:
                - id
                - name
                - business_name
                - slug
                - cif
                - ccc
                - logo_url
                - city
                - province
                - postal_code
                - street
                - number
                - floor
                - door
                - contact_email
                - contact_phone_main
                - contact_phone_secondary
                - active
                - created_at
                - updated_at
              example:
                id: 988
                active: true
                business_name:
                ccc:
                cif:
                city:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                created_at: '2026-04-15T22:18:35Z'
                door:
                floor:
                logo_url:
                name: New Test Company
                number:
                postal_code:
                province:
                slug: new-test-company
                street:
                updated_at: '2026-04-15T22:18:35Z'
  "/api/v1/admin/companies/{id}":
    delete:
      summary: Delete (deactivate) a company by ID
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 991
      responses:
        '204':
          description: deletes a company
    put:
      summary: Update a company by ID
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 990
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                company:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                  - name
              required:
              - company
            example:
              company:
                name: Updated Company Name
      responses:
        '200':
          description: updates a company
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  slug:
                    type: string
                  id:
                    type: integer
                  active:
                    type: boolean
                  business_name:
                    nullable: true
                  ccc:
                    nullable: true
                  cif:
                    nullable: true
                  city:
                    nullable: true
                  contact_email:
                    nullable: true
                  contact_phone_main:
                    nullable: true
                  contact_phone_secondary:
                    nullable: true
                  created_at:
                    type: string
                  door:
                    nullable: true
                  floor:
                    nullable: true
                  logo_url:
                    nullable: true
                  number:
                    nullable: true
                  postal_code:
                    nullable: true
                  province:
                    nullable: true
                  street:
                    nullable: true
                  updated_at:
                    type: string
                required:
                - id
                - name
                - business_name
                - slug
                - cif
                - ccc
                - logo_url
                - city
                - province
                - postal_code
                - street
                - number
                - floor
                - door
                - contact_email
                - contact_phone_main
                - contact_phone_secondary
                - active
                - created_at
                - updated_at
              example:
                name: Updated Company Name
                slug: acme-corporation-22
                id: 990
                active: true
                business_name:
                ccc:
                cif:
                city:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                created_at: '2026-04-15T22:18:35Z'
                door:
                floor:
                logo_url:
                number:
                postal_code:
                province:
                street:
                updated_at: '2026-04-15T22:18:35Z'
  "/api/v1/admin/company/{slug}":
    get:
      summary: show_by_slug
      tags:
      - Api::V1::Admin::Company
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        example: acme-corporation-21
      responses:
        '200':
          description: returns a single company given its slug
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  business_name:
                    nullable: true
                  slug:
                    type: string
                  cif:
                    nullable: true
                  ccc:
                    nullable: true
                  logo_url:
                    nullable: true
                  city:
                    nullable: true
                  province:
                    nullable: true
                  postal_code:
                    nullable: true
                  street:
                    nullable: true
                  number:
                    nullable: true
                  floor:
                    nullable: true
                  door:
                    nullable: true
                  contact_email:
                    nullable: true
                  contact_phone_main:
                    nullable: true
                  contact_phone_secondary:
                    nullable: true
                  active:
                    type: boolean
                  created_at:
                    type: string
                  updated_at:
                    type: string
                required:
                - id
                - name
                - business_name
                - slug
                - cif
                - ccc
                - logo_url
                - city
                - province
                - postal_code
                - street
                - number
                - floor
                - door
                - contact_email
                - contact_phone_main
                - contact_phone_secondary
