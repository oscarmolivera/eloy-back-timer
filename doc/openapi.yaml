  "/api/v1/auth/login":
    post:
      summary: Log in and obtain JWT access and refresh tokens
      tags:
      - Auth
      security:
      - ApiKeyAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
            example:
              email: user15@example.com
              password: password123
      responses:
        '200':
          description: returns 200 and tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      role:
                        type: string
                      first_name:
                        nullable: true
                      last_name:
                        nullable: true
                      full_name:
                        nullable: true
                      active:
                        type: boolean
                      last_sign_in_at:
                        nullable: true
                      company_id:
                        type: integer
                    required:
                    - id
                    - email
                    - role
                required:
                - access_token
                - refresh_token
                - user
              example:
                access_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjo1NjgsImV4cCI6MTc3NDI3NTg4Mn0.novwBpp7AtyuXKTvYVKmvFxjmUnNIj22XEWgsby441Y
                refresh_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjo1NjgsImV4cCI6MTc3NDg3OTc4Mn0.zUFyz2GWvDQKENvEXzGZS8LQxLDGOcHv7VQ4oDKwjy8
                user:
                  id: 568
                  email: user15@example.com
                  role: user
                  first_name:
                  last_name:
                  full_name:
                  active: true
                  last_sign_in_at:
                  company_id: 713
        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
              example:
                error: Unauthorized
                message: Invalid email or password
                status: 401
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
              example:
                error: Forbidden
                message: Account is inactive
                status: 403
  "/api/v1/auth/logout":
    delete:
      summary: Log out by invalidating the current access token
      tags:
      - Auth
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      responses:
        '204':
          description: returns 204
  "/api/v1/auth/refresh":
    post:
      summary: Refresh JWT access token using a valid refresh token
      tags:
      - Auth
      security:
      - ApiKeyAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties: {}
            example: {}
      responses:
        '200':
          description: returns 200 and new access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                required:
                - access_token
              example:
                access_token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjo1NzEsImV4cCI6MTc3NDI3NTg4Mn0.-4RVkMv0bD6D5U4Lm7tE4YlLdkF93zEWUQFNmlrkVWA
        '401':
          description: returns 401
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
              example:
                error: Unauthorized
                message: Invalid refresh token
                status: 401
  "/api/v1/health":
    get:
      summary: Check API health and database status
      tags:
      - Health
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          description: returns connected database status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  environment:
                    type: string
                  timestamp:
                    type: string
                  database:
                    type: string
                required:
                - status
                - version
                - environment
                - timestamp
                - database
              example:
                status: ok
                version: 1.0.0
                environment: test
                timestamp: '2026-03-23T14:09:42Z'
                database: connected
        '401':
          description: returns 401 unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                required:
                - error
                - message
              example:
                error: Unauthorized
                message: Invalid or missing API key
                status: 401
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained after successful login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Secret API key required on every request
security:
- BearerAuth: []
