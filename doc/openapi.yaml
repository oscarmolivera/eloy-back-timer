                    type: integer
                required:
                - error
                - message
                - status
              example:
                error: Forbidden
                message: Access denied
                status: 403
    post:
      summary: Create a new company
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                company:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                  - name
              required:
              - company
            example:
              company:
                name: New Test Company
      responses:
        '201':
          description: creates a new company
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  active:
                    type: boolean
                  business_name:
                    nullable: true
                  ccc:
                    nullable: true
                  cif:
                    nullable: true
                  city:
                    nullable: true
                  contact_email:
                    nullable: true
                  contact_phone_main:
                    nullable: true
                  contact_phone_secondary:
                    nullable: true
                  created_at:
                    type: string
                  door:
                    nullable: true
                  floor:
                    nullable: true
                  logo_url:
                    nullable: true
                  name:
                    type: string
                  number:
                    nullable: true
                  postal_code:
                    nullable: true
                  province:
                    nullable: true
                  slug:
                    type: string
