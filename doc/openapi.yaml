                province:
                slug: new-test-company
                street:
                updated_at: '2026-03-23T14:09:42Z'
  "/api/v1/admin/companies/{id}":
    delete:
      summary: Delete (deactivate) a company by ID
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 711
      responses:
        '204':
          description: deletes a company
    get:
      summary: Get a single company by ID
      tags:
      - Admin - Companies
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 709
      responses:
        '200':
          description: returns a single company
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  active:
                    type: boolean
                  business_name:
                    nullable: true
                  ccc:
                    nullable: true
                  cif:
                    nullable: true
                  city:
                    nullable: true
                  contact_email:
                    nullable: true
                  contact_phone_main:
