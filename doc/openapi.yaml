                province:
                postal_code:
                street:
                number:
                floor:
                door:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
                active: true
              - id: 706
                name: Acme Corporation 19
                business_name:
                slug: acme-corporation-19
                cif:
                ccc:
                logo_url:
                city:
                province:
                postal_code:
                street:
                number:
                floor:
                door:
                contact_email:
                contact_phone_main:
                contact_phone_secondary:
