name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost/eloy_back_timer_test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eloy_back_timer_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:create db:migrate

      - name: Run specs and generate OpenAPI
        env:
          OPENAPI: "1"
        run: bundle exec rspec --format documentation

      - name: Verify OpenAPI spec is up to date
        run: |
          git diff --exit-code doc/openapi.yaml || \
            (echo "❌ doc/openapi.yaml is out of date. Run OPENAPI=1 bundle exec rspec locally and commit the result." && exit 1)